## ¿Qué es Customer Analytics?

Customer Analytics es la disciplina orientada al análisis sistemático de datos del cliente con el fin de comprender su comportamiento, segmentar audiencias, predecir acciones futuras y optimizar la toma de decisiones estratégicas relacionadas con adquisición, retención y maximización de valor.

El Análisis Exploratorio de Datos (EDA) es un flujo de trabajo diseñado para obtener una mejor comprensión de sus datos. El flujo de trabajo consta de tres pasos.

- El primero consiste en generar preguntas sobre los datos. En este paso se quiere ser lo más amplio posible, ya que en este momento no se tiene una buena idea de los datos.

- A continuación, se buscan las respuestas a estas preguntas mediante la visualización, la transformación y el modelado de los datos.

- Por último, refine sus preguntas o genere nuevas preguntas

En R hay dos herramientas principales que apoyan el proceso de exploración de datos: los gráficos y los estadísticos de resumen.

- **Data:** datos sin procesar que desea trazar.
- **Geometrías `geom_:`** formas geométricas que representarán los datos.
- **Estética `aes()`:** estética de los objetos geométricos y estadísticos, como posición, color, tamaño, forma y transparencia.
- **Escalas `scale_`:** asignaciones entre los datos y las dimensiones estéticas, como el rango de datos para trazar el ancho o los valores de los factores para los colores.
- **Transformaciones estadísticas `stat_`:** resúmenes estadísticos de los datos, como cuantiles, curvas ajustadas y sumas.
- **Sistema de coordenadas `coord_`:** transformación utilizada para mapear coordenadas de datos en el plano del rectángulo de datos.
- **Facetas `facet_`:** disposición de los datos en una cuadrícula de gráficos.
- **Temas visuales `theme()`:** los valores predeterminados visuales generales de una trama, como el fondo, las cuadrículas, los ejes, el tipo de letra predeterminado, los tamaños y los colores.

Los valores atípicos, conocidos en inglés como outliers, son puntos en los datos que parecen no ajustarse al patrón. Algunas veces dichos valores atípicos son errores cometidos durante la ingesta de datos; otras veces sugieren nueva información. Cuando tienes una gran cantidad de datos, es difícil identificar los valores atípicos en un histograma. 

Es un buen hábito repetir tu análisis con y sin los valores inusuales. Si tienen un efecto mínimo en los resultados y no puedes descubrir por qué están en los datos, es razonable reemplazarlos con valores ausentes y seguir adelante con tu análisis. Sin embargo, si tienen un efecto sustancial en tus resultados, no deberías ignorarlos sin justificación. Deberás descubrir qué los causó (p.ej., un error en la entrada de datos) y explicitar que los removiste en tu reporte escrito.

Si has encontrado valores inusuales en tu set de datos y simplemente quieres seguir con el resto de tu análisis, tienes dos opciones.

Desecha la fila completa donde están los valores inusuales.


``` r
datos_credito2 &lt;- datos_credito %&gt;% filter(between(y, 3, 20))
```

No recomiendo esta opción porque el hecho de que una medida sea inválida no significa que todas las mediciones lo sean. Además, si la calidad de tus datos es baja, después de aplicar esta estrategia en todas tus variables ¡quizás te des cuenta que ya no tienes datos con los que trabajar!

En lugar de eso, recomiendo reemplazar los valores inusuales con valores faltantes. La manera más fácil de hacerlo es usar mutate() para reemplazar la variable con una copia editada de la misma. Puedes usar la función ifelse() para reemplazar valores inusuales con NA:


``` r
datos_credito2 &lt;- datos_credito %&gt;% mutate(y = ifelse(y &lt; 3 | y &gt; 20, NA, y))
```

El coeficiente de correlación de Pearson es un índice que puede utilizarse para medir el grado de relación de dos variables siempre y cuando ambas sean cuantitativas y continuas.

El valor del índice de correlación denotado por `\(r_{xy}\)` varía en el intervalo `\([-1,1]\)`. El signo indica el sentido de la relación:

- Si `\(r=1\)`, existe una correlación positiva perfecta. El índice indica una dependencia total entre las dos variables denominada relación directa: cuando una de ellas aumenta, la otra también lo hace en proporción constante.

- Si `\(0&lt;r&lt;1\)` entonces existe una correlación positiva.

- Si `\(r=0\)` entonces no existe relación lineal pero esto no necesariamente implica que las variables son independientes: pueden existir todavía relaciones no lineales entre las dos variables.

- Si `\(-1&lt;r&lt;0\)`, existe una correlación negativa.

- Si `\(r=-1\)`, existe una correlación negativa perfecta. El índice indica una dependencia total entre las dos variables llamada relación opuesta: cuando una de ellas aumenta, la otra cambia su signo en proporción constante.
